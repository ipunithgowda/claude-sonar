<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 820" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace">
  <defs>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#000" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1440" height="820" fill="#0b0b0d"/>

  <!-- VSCode window -->
  <g filter="url(#shadow)">
    <!-- Window frame -->
    <rect x="40" y="20" width="1360" height="780" rx="10" fill="#1e1e1e"/>

    <!-- Title bar -->
    <rect x="40" y="20" width="1360" height="32" rx="10" fill="#323233"/>
    <rect x="40" y="38" width="1360" height="14" fill="#323233"/>
    <!-- Traffic lights -->
    <circle cx="62" cy="36" r="6" fill="#ff5f56"/>
    <circle cx="82" cy="36" r="6" fill="#ffbd2e"/>
    <circle cx="102" cy="36" r="6" fill="#27c93f"/>
    <!-- Title -->
    <text x="720" y="41" text-anchor="middle" fill="#8a8a8e" font-size="12" font-family="-apple-system, sans-serif">WORK — Visual Studio Code</text>

    <!-- Activity bar (far left, icon strip) -->
    <rect x="40" y="52" width="48" height="748" fill="#181818"/>
    <!-- File icon -->
    <rect x="56" y="64" width="16" height="18" rx="2" fill="none" stroke="#e8e8ea" stroke-width="1.5"/>
    <line x1="60" y1="70" x2="68" y2="70" stroke="#e8e8ea" stroke-width="1"/>
    <line x1="60" y1="74" x2="66" y2="74" stroke="#e8e8ea" stroke-width="1"/>
    <!-- Active indicator -->
    <rect x="40" y="58" width="2" height="30" fill="#f5f5f7"/>
    <!-- Search icon -->
    <circle cx="64" cy="110" r="7" fill="none" stroke="#8a8a8e" stroke-width="1.5"/>
    <line x1="69" y1="115" x2="73" y2="119" stroke="#8a8a8e" stroke-width="1.5"/>
    <!-- Git icon -->
    <circle cx="64" cy="148" r="3" fill="none" stroke="#8a8a8e" stroke-width="1.3"/>
    <circle cx="64" cy="162" r="3" fill="none" stroke="#8a8a8e" stroke-width="1.3"/>
    <line x1="64" y1="151" x2="64" y2="159" stroke="#8a8a8e" stroke-width="1.3"/>
    <!-- Extensions icon -->
    <rect x="58" y="188" width="6" height="6" rx="1" fill="none" stroke="#8a8a8e" stroke-width="1.2"/>
    <rect x="66" y="188" width="6" height="6" rx="1" fill="none" stroke="#8a8a8e" stroke-width="1.2"/>
    <rect x="58" y="196" width="6" height="6" rx="1" fill="none" stroke="#8a8a8e" stroke-width="1.2"/>
    <rect x="66" y="196" width="6" height="6" rx="1" fill="none" stroke="#8a8a8e" stroke-width="1.2"/>

    <!-- Explorer panel (left sidebar) -->
    <rect x="88" y="52" width="280" height="748" fill="#252526"/>
    <!-- Explorer header -->
    <text x="100" y="72" fill="#b4b4b4" font-size="11" font-family="-apple-system, sans-serif" letter-spacing="1.5" font-weight="600">EXPLORER</text>

    <!-- WORK root -->
    <text x="100" y="98" fill="#e8e8ea" font-size="13" font-family="-apple-system, sans-serif" font-weight="600">▾ WORK</text>

    <!-- Project folders — showing real project count -->
    <g font-size="13" font-family="-apple-system, sans-serif">
      <text x="118" y="122" fill="#c4c4c4">▸ ai-portfolio</text>
      <text x="118" y="144" fill="#c4c4c4">▸ BUSINESS_IDEAS</text>
      <text x="118" y="166" fill="#c4c4c4">▸ claude-sonar</text>
      <text x="118" y="188" fill="#c4c4c4">▸ docuchat</text>
      <text x="118" y="210" fill="#dcdc8b">▸ meeting-mind</text>
      <text x="118" y="232" fill="#c4c4c4">▸ PMO_APP_v0.2</text>
      <text x="118" y="254" fill="#dcdc8b">▸ prism</text>
      <text x="118" y="276" fill="#c4c4c4">▸ ProjectX</text>
      <text x="118" y="298" fill="#c4c4c4">▸ react-app-infra-tf</text>
      <text x="118" y="320" fill="#dcdc8b">▸ tripwire</text>
      <text x="118" y="342" fill="#dcdc8b">▸ witness</text>
      <text x="118" y="364" fill="#c4c4c4">▸ weather-app-v1</text>
      <text x="118" y="386" fill="#5a5a5e">  CLAUDE.md</text>
      <text x="118" y="408" fill="#5a5a5e">  CLEANUP_LOG.md</text>
      <text x="118" y="430" fill="#5a5a5e">  TODO.md</text>
    </g>

    <!-- Separator line -->
    <line x1="368" y1="52" x2="368" y2="800" stroke="#2d2d2d" stroke-width="1"/>

    <!-- ====== RIGHT SIDE: Terminal panels (the main event) ====== -->

    <!-- Terminal tabs bar -->
    <rect x="368" y="52" width="1032" height="30" fill="#252526"/>
    <text x="384" y="72" fill="#0a84ff" font-size="12" font-family="-apple-system, sans-serif" font-weight="600">TERMINAL</text>

    <!-- 4 terminal tab labels -->
    <rect x="470" y="56" width="130" height="22" rx="4" fill="#1e1e1e"/>
    <text x="480" y="72" fill="#8a8a8e" font-size="11" font-family="-apple-system, sans-serif">claude: witness</text>

    <rect x="608" y="56" width="130" height="22" rx="4" fill="#2d2d30"/>
    <text x="618" y="72" fill="#e8e8ea" font-size="11" font-family="-apple-system, sans-serif">claude: tripwire</text>

    <rect x="746" y="56" width="130" height="22" rx="4" fill="#1e1e1e"/>
    <text x="756" y="72" fill="#8a8a8e" font-size="11" font-family="-apple-system, sans-serif">claude: prism</text>

    <rect x="884" y="56" width="155" height="22" rx="4" fill="#1e1e1e"/>
    <text x="894" y="72" fill="#8a8a8e" font-size="11" font-family="-apple-system, sans-serif">claude: meeting-mind</text>

    <!-- ====== Terminal 1: witness (top-left) ====== -->
    <rect x="368" y="82" width="516" height="348" fill="#0b0b0d"/>
    <g font-size="12.5">
      <text x="384" y="108" fill="#27c93f">punith@axe</text>
      <text x="464" y="108" fill="#5a5a5e">~/witness</text>
      <text x="540" y="108" fill="#e8e8ea">$ claude</text>

      <text x="384" y="132" fill="#5a5a5e">AXE ›</text>
      <text x="430" y="132" fill="#c4c4c4">Running database migration for forensic_events table...</text>

      <text x="384" y="156" fill="#5a5a5e">     </text>
      <text x="396" y="156" fill="#6a9955">✓ Migration 0042 applied</text>
      <text x="384" y="178" fill="#5a5a5e">     </text>
      <text x="396" y="178" fill="#6a9955">✓ Schema validated</text>
      <text x="384" y="200" fill="#5a5a5e">     </text>
      <text x="396" y="200" fill="#6a9955">✓ 3 indexes created</text>

      <text x="384" y="232" fill="#5a5a5e">AXE ›</text>
      <text x="430" y="232" fill="#c4c4c4">Starting dev server on :3001...</text>
      <text x="384" y="254" fill="#5a5a5e">     </text>
      <text x="396" y="254" fill="#6a9955">✓ Server ready at http://localhost:3001</text>

      <text x="384" y="286" fill="#5a5a5e">AXE ›</text>
      <text x="430" y="286" fill="#c4c4c4">Deploying preview to Vercel...</text>

      <!-- AXE voice indicator -->
      <rect x="384" y="316" width="480" height="32" rx="6" fill="#0a1a2f" stroke="#0a84ff" stroke-width="0.5"/>
      <text x="400" y="337" fill="#0a84ff" font-size="12">🔊</text>
      <text x="420" y="337" fill="#0a84ff" font-size="12" font-style="italic">"Migration and server startup complete, sir."</text>

      <!-- AXE waveform mini -->
      <g fill="#0a84ff" opacity="0.7">
        <rect x="834" y="322" width="3" height="10" rx="1.5"><animate attributeName="height" values="10;20;10" dur="1.1s" begin="0s" repeatCount="indefinite"/><animate attributeName="y" values="327;322;327" dur="1.1s" begin="0s" repeatCount="indefinite"/></rect>
        <rect x="840" y="322" width="3" height="16" rx="1.5"><animate attributeName="height" values="16;24;16" dur="1.1s" begin="0.1s" repeatCount="indefinite"/><animate attributeName="y" values="324;320;324" dur="1.1s" begin="0.1s" repeatCount="indefinite"/></rect>
        <rect x="846" y="322" width="3" height="12" rx="1.5"><animate attributeName="height" values="12;22;12" dur="1.1s" begin="0.2s" repeatCount="indefinite"/><animate attributeName="y" values="326;321;326" dur="1.1s" begin="0.2s" repeatCount="indefinite"/></rect>
        <rect x="852" y="322" width="3" height="18" rx="1.5"><animate attributeName="height" values="18;26;18" dur="1.1s" begin="0.3s" repeatCount="indefinite"/><animate attributeName="y" values="323;319;323" dur="1.1s" begin="0.3s" repeatCount="indefinite"/></rect>
        <rect x="858" y="322" width="3" height="10" rx="1.5"><animate attributeName="height" values="10;18;10" dur="1.1s" begin="0.4s" repeatCount="indefinite"/><animate attributeName="y" values="327;323;327" dur="1.1s" begin="0.4s" repeatCount="indefinite"/></rect>
      </g>
    </g>

    <!-- ====== Terminal 2: tripwire (top-right) ====== -->
    <rect x="884" y="82" width="516" height="348" fill="#0d0d10"/>
    <!-- Active indicator border -->
    <rect x="884" y="82" width="516" height="348" fill="none" stroke="#0a84ff" stroke-width="1" rx="0"/>
    <g font-size="12.5">
      <text x="900" y="108" fill="#27c93f">punith@axe</text>
      <text x="980" y="108" fill="#5a5a5e">~/tripwire</text>
      <text x="1060" y="108" fill="#e8e8ea">$ claude</text>

      <text x="900" y="132" fill="#5a5a5e">AXE ›</text>
      <text x="946" y="132" fill="#c4c4c4">Running full test suite...</text>

      <text x="900" y="156" fill="#5a5a5e">     </text>
      <text x="912" y="156" fill="#6a9955">✓ unit tests        58 passing</text>
      <text x="900" y="178" fill="#5a5a5e">     </text>
      <text x="912" y="178" fill="#6a9955">✓ integration tests  34 passing</text>
      <text x="900" y="200" fill="#5a5a5e">     </text>
      <text x="912" y="200" fill="#6a9955">✓ e2e tests          12 passing</text>

      <text x="900" y="232" fill="#5a5a5e">AXE ›</text>
      <text x="946" y="232" fill="#c4c4c4">Building production bundle...</text>
      <text x="900" y="254" fill="#5a5a5e">     </text>
      <text x="912" y="254" fill="#dcdcaa">⠋ bundling 147 modules...</text>

      <text x="900" y="286" fill="#5a5a5e">AXE ›</text>
      <text x="946" y="286" fill="#c4c4c4">Analyzing bundle size delta...</text>

      <!-- AXE voice indicator -->
      <rect x="900" y="316" width="480" height="32" rx="6" fill="#0a1a2f" stroke="#0a84ff" stroke-width="0.5"/>
      <text x="916" y="337" fill="#0a84ff" font-size="12">🔊</text>
      <text x="936" y="337" fill="#0a84ff" font-size="12" font-style="italic">"All 104 tests passing, bundle building now, sir."</text>
    </g>

    <!-- ====== Terminal 3: prism (bottom-left) ====== -->
    <rect x="368" y="430" width="516" height="348" fill="#0b0b0d"/>
    <g font-size="12.5">
      <text x="384" y="456" fill="#27c93f">punith@axe</text>
      <text x="464" y="456" fill="#5a5a5e">~/prism</text>
      <text x="528" y="456" fill="#e8e8ea">$ claude</text>

      <text x="384" y="480" fill="#5a5a5e">AXE ›</text>
      <text x="430" y="480" fill="#c4c4c4">Refactoring API layer to use middleware pattern...</text>

      <text x="384" y="504" fill="#5a5a5e">     </text>
      <text x="396" y="504" fill="#6a9955">✓ routes/auth.ts updated</text>
      <text x="384" y="526" fill="#5a5a5e">     </text>
      <text x="396" y="526" fill="#6a9955">✓ routes/events.ts updated</text>
      <text x="384" y="548" fill="#5a5a5e">     </text>
      <text x="396" y="548" fill="#dcdcaa">⠋ routes/analytics.ts in progress...</text>

      <text x="384" y="580" fill="#5a5a5e">AXE ›</text>
      <text x="430" y="580" fill="#c4c4c4">Generating types from updated schema...</text>

      <!-- AXE voice indicator -->
      <rect x="384" y="660" width="480" height="32" rx="6" fill="#111418" stroke="#2d2d30" stroke-width="0.5"/>
      <text x="400" y="681" fill="#5a5a5e" font-size="12">🔇</text>
      <text x="420" y="681" fill="#5a5a5e" font-size="12" font-style="italic">waiting for turn to complete...</text>
    </g>

    <!-- ====== Terminal 4: meeting-mind (bottom-right) ====== -->
    <rect x="884" y="430" width="516" height="348" fill="#0d0d10"/>
    <g font-size="12.5">
      <text x="900" y="456" fill="#27c93f">punith@axe</text>
      <text x="980" y="456" fill="#5a5a5e">~/meeting-mind</text>
      <text x="1095" y="456" fill="#e8e8ea">$ claude</text>

      <text x="900" y="480" fill="#5a5a5e">AXE ›</text>
      <text x="946" y="480" fill="#c4c4c4">Implementing Groq transcript summarizer...</text>

      <text x="900" y="504" fill="#5a5a5e">     </text>
      <text x="912" y="504" fill="#6a9955">✓ groq-client.ts created</text>
      <text x="900" y="526" fill="#5a5a5e">     </text>
      <text x="912" y="526" fill="#6a9955">✓ summarize.ts created</text>
      <text x="900" y="548" fill="#5a5a5e">     </text>
      <text x="912" y="548" fill="#6a9955">✓ transcript-parser.ts created</text>

      <text x="900" y="580" fill="#5a5a5e">AXE ›</text>
      <text x="946" y="580" fill="#c4c4c4">Wiring up the summary tab component...</text>
      <text x="900" y="602" fill="#5a5a5e">     </text>
      <text x="912" y="602" fill="#dcdcaa">⠋ components/SummaryTab.tsx...</text>

      <!-- AXE voice indicator -->
      <rect x="900" y="660" width="480" height="32" rx="6" fill="#0a1a2f" stroke="#0a84ff" stroke-width="0.5"/>
      <text x="916" y="681" fill="#0a84ff" font-size="12">🔊</text>
      <text x="936" y="681" fill="#0a84ff" font-size="12" font-style="italic">"Transcript summarizer wired up, sir."</text>
    </g>

    <!-- Separator lines between terminal panels -->
    <line x1="884" y1="82" x2="884" y2="778" stroke="#2d2d2d" stroke-width="1"/>
    <line x1="368" y1="430" x2="1400" y2="430" stroke="#2d2d2d" stroke-width="1"/>

    <!-- Status bar -->
    <rect x="40" y="778" width="1360" height="22" rx="0" fill="#007acc"/>
    <rect x="40" y="788" width="1360" height="12" rx="10" fill="#007acc"/>
    <text x="56" y="793" fill="#fff" font-size="11" font-family="-apple-system, sans-serif">main*</text>
    <text x="120" y="793" fill="#fff" font-size="11" font-family="-apple-system, sans-serif">⟳ 4 terminals</text>
    <text x="1300" y="793" fill="#fff" font-size="11" font-family="-apple-system, sans-serif" text-anchor="end">AXE active</text>
  </g>

  <!-- Label overlay — subtle annotation -->
  <g font-family="-apple-system, sans-serif">
    <text x="88" y="810" fill="#5a5a5e" font-size="11">12 projects in workspace</text>
    <text x="868" y="810" fill="#0a84ff" font-size="11" text-anchor="middle">4 Claude Code sessions running in parallel — AXE speaks status from each</text>
  </g>
</svg>
